  <!-- ========== HEADER ========== -->
  <header class="px-contain bg-black js-header">
    <div class="g-header f-h f-a-c cr-silver">

      <button
        type="button"
        class="g-header__mobile-menu-toggle tablet-down-only js-mobile-menu-toggle"
        aria-label="Trigger mobile menu"
        onclick="document.documentElement.classList.add('is-mobile-menu-active')"
      ><hr></button>

      <button
        type="button"
        class="g-header__mobile-menu-toggle__close tablet-down-only js-mobile-menu-toggle"
        aria-label="Close mobile menu"
        onclick="document.documentElement.classList.remove('is-mobile-menu-active')"
      >
        <svg class="svg-close" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:10px">
          <path d="M1 1L9 9M1 9L9 1" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>

      <nav class="g-header__nav tablet-up-only">
        <ul class="g-header__linklist f-h gap-md">
          <li class="g-header__linklist__item btn-underline t-l-2">
            <a href="https://www.wattspet.com/products/better-dailies">Shop</a>
          </li>
          <li class="g-header__linklist__item btn-underline t-l-2">
            <a href="/blog">Blog</a>
          </li>
          <li class="g-header__linklist__item btn-underline t-l-2">
            <a href="/ingredient-analyzer">Ingredient Analyzer</a>
          </li>
        </ul>
      </nav>

      <a
        class="g-header__logo p-center"
        href="https://www.wattspet.com/"
        aria-label="Watts Pet logo"
      >
        <svg class="g-header__logo__lottie mobile-up-only" viewBox="0 0 200 46" fill="none" xmlns="http://www.w3.org/2000/svg">

      </a>

      <div class="g-header__actions f-h gap-md t-l-2">
        <a
          class="btn-underline t-l-2 tablet-up-only"
          href="https://www.wattspet.com/account"
        >My Account</a>

        <button type="button" class="js-minicart-toggle">
          <span class="g-header__cart-text">Cart</span>
          (<span class="js-cart-item-count">0</span>)
        </button>
      </div>

    </div>

    <div id="watts-mobile-menu" class="g-header__mobile-menu tablet-down-only">
      <div class="g-header__mobile-menu__content f-v f-a-s gap-sm">
        <ul class="g-header__mobile-menu__list f-v f-a-s">
          <li class="g-header__mobile-menu__list__item">
            <a class="g-header__mobile-menu__item t-l-1" href="https://www.wattspet.com/products/better-dailies">
              <span class="g-header__mobile-menu__item__active-deco"></span>
              <span>Shop</span>
            </a>
          </li>
          <li class="g-header__mobile-menu__list__item">
            <a class="g-header__mobile-menu__item t-l-1" href="/blog">
              <span class="g-header__mobile-menu__item__active-deco"></span>
              <span>Blog</span>
            </a>
          </li>
          <li class="g-header__mobile-menu__list__item">
            <a class="g-header__mobile-menu__item t-l-1" href="/ingredient-analyzer">
              <span class="g-header__mobile-menu__item__active-deco"></span>
              <span>Ingredient Analyzer</span>
            </a>
          </li>
          <a class="g-header__mobile-menu__item g-header__mobile-menu__item--dark t-l-1" href="https://www.wattspet.com/account">My Account</a>
        </ul>
        <a class="g-header__mobile-menu__logo" href="https://www.wattspet.com/" aria-label="Watts Pet logo">
          <svg class="svg-logo" viewBox="0 0 200 46" fill="none" xmlns="http://www.w3.org/2000/svg">

    <span class="g-header__corner g-header__corner--left cr-black" aria-hidden="true">
      <svg viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M25 1C11.7452 1 1 11.7452 1 25H0V0H25V1Z" fill="currentColor"/>
      </svg>
    </span>
    <span class="g-header__corner g-header__corner--right cr-black" aria-hidden="true">
      <svg viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 1C13.2548 1 24 11.7452 24 25H25V0H0V1Z" fill="currentColor"/>
      </svg>
    </span>
  </header>
  <button class="g-overlay" aria-label="Close overlay" onclick="document.documentElement.classList.remove('is-mobile-menu-active')"></button>
