  <style>body { background-color: #000; opacity: 1; }</style>
  <style>
/* un-layered — overrides Shopify reset */

/* Main layout — explicit so un-layered * resets in old pages can't block centering */
main {
  max-width: 900px;
  margin: 16px auto 40px;
  padding: 0 20px;
}

/* Article-only restoration */
article {
  color: var(--text-dark);
}

article h1 {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}

article h2 {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.2;
  margin: 56px 0 24px;
  letter-spacing: -0.01em;
}

article h3 {
  font-size: 24px;
  font-weight: 600;
  line-height: 1.3;
  margin: 40px 0 16px;
}

article p {
  font-size: 17px;
  font-weight: 500;
  line-height: 1.7;
  margin-bottom: 20px;
}

article ul,
article ol {
  padding-left: 28px;
  margin: 24px 0;
}

article ul {
  list-style: disc;
}

article ol {
  list-style: decimal;
}

article li {
  font-size: 17px;
  font-weight: 500;
  line-height: 1.7;
  margin-top: 0;
  margin-bottom: 12px;
}

article strong {
  font-weight: 600;
}

article a {
  color: var(--accent-navy);
  transition: opacity 0.2s ease;
}

/* Intro paragraph — larger lead text, muted color */
.article-intro {
  font-size: 19px;
  font-weight: 500;
  line-height: 1.6;
  color: var(--text-muted);
  margin-bottom: 0;
}

/* FAQ items — specific overrides that win over article h3 / article p */
.faq-item h3 {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.3;
  margin: 0 0 16px 0;
  color: var(--brand-orange);
}

.faq-item p {
  margin-bottom: 0;
}

@media (min-width: 768px) {
  article h1 { font-size: 48px; margin-bottom: 20px; }
  article h2 { font-size: 36px; margin: 64px 0 28px; }
  article h3 { font-size: 28px; margin: 48px 0 20px; }
  article p  { font-size: 18px; margin-bottom: 24px; }
  article li { font-size: 18px; }
  .article-intro { font-size: 21px; }
  .faq-item h3 { font-size: 23px; }
}

.g-header li {
  margin-top: 0;
}

.g-header__nav a {
  font: var(--t-l-2);
}

/* Static-render compensation: lottie-player fills its box; our SVG preserves 200:46
   and is width-constrained. Reduce container to 84px to shrink the wordmark.
   bottom:auto cancels main.min.css bottom:4px anchoring. */
.g-header .g-header__logo {
  width: 84px;
  height: 60.6328px;
}
.g-header .g-header__logo__lottie {
  top: 50%;
  bottom: auto;
  transform: translateY(-50%);
}

.g-footer__nav {
  order: 0;
}

.g-footer__nav a {
  font-weight: 400;
}

.g-footer li {
  margin-top: 0;
}

.c-email-capture-shopify .c-form__fields {
  margin-top: var(--s-gap-sm);
}
  </style>
